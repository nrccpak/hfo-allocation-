<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRCC HFO Allocation — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c232d; --line:#2a313c;
    --ink:#e6edf3; --muted:#8b97a7; --faint:#5b6675;
    --hfo:#e8a13a; --hfo-deep:#b9741a;
    --ok:#3fb950;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100vh}
  body{
    background:
      radial-gradient(1100px 500px at 50% -10%, rgba(232,161,58,.09), transparent 60%),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
  }
  .logo{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .drop{width:36px;height:36px;flex:0 0 auto}
  .logo h1{font-family:Oswald;font-weight:700;font-size:26px;letter-spacing:.06em;
    text-transform:uppercase;margin:0}
  .logo .sub{font-family:'IBM Plex Mono';font-size:11px;color:var(--hfo);
    letter-spacing:.2em;margin-top:3px}
  .divider{width:48px;height:2px;background:var(--hfo);border-radius:2px;margin:22px 0}
  .cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:620px}
  .card{flex:1;min-width:240px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:26px 24px;text-decoration:none;color:inherit;
    transition:border-color .2s, transform .15s;display:block}
  .card:hover{border-color:var(--hfo);transform:translateY(-2px)}
  .card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;margin-bottom:16px;font-size:20px}
  .card-icon.amber{background:rgba(232,161,58,.15)}
  .card-icon.green{background:rgba(63,185,80,.12)}
  .card h2{font-family:Oswald;font-weight:600;font-size:18px;letter-spacing:.04em;
    text-transform:uppercase;margin:0 0 6px}
  .card p{font-family:'IBM Plex Mono';font-size:11.5px;color:var(--muted);margin:0;line-height:1.6}
  .card .arr{display:block;margin-top:18px;font-family:Oswald;font-size:12px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--hfo)}
  .foot{margin-top:36px;font-family:'IBM Plex Mono';font-size:11px;color:var(--faint);
    letter-spacing:.06em;text-align:center}
</style>
</head>
<body>

<div class="logo">
  <svg class="drop" viewBox="0 0 24 24" fill="none">
    <path d="M12 2.5C12 2.5 5 10.2 5 15a7 7 0 0014 0c0-4.8-7-12.5-7-12.5z" fill="#e8a13a"/>
  </svg>
  <div>
    <h1>HFO Allocation</h1>
    <div class="sub">NRCC · TURAIF</div>
  </div>
</div>

<div class="divider"></div>

<div class="cards">
  <a class="card" href="director.html">
    <div class="card-icon amber">⚙️</div>
    <h2>Director Control</h2>
    <p>View tank levels, set minimums &amp; batches, build and publish the daily allocation plan.</p>
    <span class="arr">Open →</span>
  </a>

  <a class="card" href="unloading.html">
    <div class="card-icon green">🚛</div>
    <h2>Unloading Team</h2>
    <p>View today's published tanker unloading instructions and track progress in the field.</p>
    <span class="arr">Open →</span>
  </a>
</div>

<div class="foot">NRCC · Heavy Fuel Oil Allocation System</div>

</body>
</html>
